<div *ngIf="lista" >
	<div class="card-body" >
		<p><strong>Descripción:</strong> {{ lista.descripcion }}</p>

		<div class="mt-3">
			<p class="mb-2"><strong>Tareas de ejemplo:</strong></p>
			<ul>
				<li *ngFor="let tarea of tareas">{{ tarea }}</li>
			</ul>
		</div>

		<button type="button" class="btn btn-secondary mt-2" (click)="cerrar()">
			Ocultar detalle
		</button>
	</div>
</div>
