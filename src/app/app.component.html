<main class="main">
  <div class="container">
    <h1><strong>{{ title }}</strong></h1>
    <ngb-alert type="success" *ngIf="msg!=''" 
      (close)="msg=''">
      {{msg}}
    </ngb-alert>

    <form #modeloForm="ngForm" *ngIf="mostrarForm" class="form-card" (ngSubmit)="crearLista()">
      <h4>{{ listaSeleccionada ? 'Modificar lista' : 'Crear nueva lista' }}</h4>
      <p>Nombre: </p>
      <input type="text" id="nombre" name="nombre" 
        required [(ngModel)]="nueva.nombre" name="nombre">
      <p>Descripción: </p>
      <input type="text" id="descripcion" name="descripcion" 
        [(ngModel)]="nueva.descripcion" name="descripcion">
      <p>Color: </p>
      <input type="color" id="color" name="color" 
        required [(ngModel)]="nueva.color" name="color">
      <div class="checkbox-group">
        <label for="visible">Visible:</label>
        <input type="checkbox" id="visible" name="visible" 
        [(ngModel)]="nueva.visible" name="visible">
      </div>
      <div>
        <button type="submit" class="button btn btn-sm btn-primary">
          {{ listaSeleccionada ? 'Guardar cambios' : 'Crear lista' }}
        </button>
        <button type="button" class="button btn btn-sm btn-secondary" (click)="ocultarFormulario()">Cancelar</button>
      </div>
    </form>
    
    <button *ngIf="!mostrarForm" class="button btn btn-sm btn-primary" (click)="mostrarFormulario()">Añadir nueva lista</button>

    <div class="filtros" *ngIf="listas.length > 0">
      <label for="filtroListas" class="form-label mb-0">Filtrar listas:</label>
      <select id="filtroListas" class="form-select form-select-sm w-auto" [(ngModel)]="filtroListas" name="filtroListas">
        <option value="todas">Todas</option>
        <option value="visibles">Visibles</option>
        <option value="noVisibles">No visibles</option>
      </select>
    </div>

    <div *ngFor="let lista of listasFiltradas" class="cards">
      <div class="card" [ngStyle] = "{'background-color': lista.color}">
        <div class="card-header">
          <h5 class="card-title">{{lista.nombre}}</h5>
        </div>
        <div class="card-body">
          <app-lista
            *ngIf="listasAbiertas.has(lista.id)"
            [lista]="lista"
            (cerrarDetalle)="toggleMostrarDetalles(lista)">
          </app-lista>
          <button *ngIf="!listasAbiertas.has(lista.id)" class="button btn btn-sm btn-primary" (click)="toggleMostrarDetalles(lista)">
            Ver detalle
          </button>
          <button class="button btn btn-sm btn-secondary" (click)="modificarLista(lista)">
            Modificar
          </button>
          <button class="button btn btn-sm btn-danger" (click)="abrirModalEliminar(confirmarEliminacionModal, lista)">
            Eliminar
          </button>
        </div>  
      </div>
    </div>

    <ng-template #confirmarEliminacionModal let-modal>
      <div class="modal-header">
        <h5 class="modal-title">Confirmar eliminación</h5>
      </div>
      <div class="modal-body">
        <p>¿Quieres eliminar la lista <strong>{{ listaSeleccionada?.nombre }}</strong>?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
        <button type="button" class="btn btn-danger" (click)="confirmarEliminacion(modal)">Eliminar</button>
      </div>
    </ng-template>
  </div>
</main>
