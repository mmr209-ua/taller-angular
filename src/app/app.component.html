<style>
  h1 {
    font-size: 3.125rem;
    color: var(--gray-900);
    font-weight: 500;
    line-height: 100%;
    letter-spacing: -0.125rem;
    margin: 0;
    font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }

  p {
    margin: 0;
    color: var(--gray-700);
  }

  main {
    width: 100%;
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
    box-sizing: inherit;
    position: relative;
  }

  .cards {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    margin-bottom: 1rem;
  }

  .button {
    margin: 0.25rem;
  }
</style>

<main class="main">
  <div class="container">
    <h1>{{ title }}</h1>
    <ngb-alert type="success" *ngIf="msg!=''" 
      (close)="msg=''">
      {{msg}}
    </ngb-alert>
    <div *ngFor="let lista of listas" class="cards">
      <div class="card" [ngStyle] = "{'background-color': lista.color}">
        <div class="card-header">
          <h5 class="card-title">{{lista.nombre}}</h5>
        </div>
        <div class="card-body">
          <app-lista
            *ngIf="lista.visible"
            [lista]="lista"
            (cerrarDetalle)="ocultarDetalle(lista)">
          </app-lista>
          <button (click)="mostrarDetalle(lista)" class="button btn btn-sm btn-primary">Ver detalle</button>
          <button class="button btn btn-sm btn-secondary">Modificar</button>
          <button class="button btn btn-sm btn-danger">Eliminar</button>
        </div>  
      </div>
    </div>



    <form *ngIf="mostrarForm">
      <p>Nombre: </p>
      <input type="text" id="nombre" name="nombre" required
        [(ngModel)]="nueva.nombre" name="nombre">
      <p>Descripción: </p>
      <input type="text" id="descripcion" name="descripcion" required
        [(ngModel)]="nueva.descripcion" name="descripcion">
      <p>Color: </p>
      <input type="color" id="color" name="color" required
        [(ngModel)]="nueva.color" name="color">
      <div>
        <button (click)="crearLista()">Crear lista</button>
        <button (click)="ocultarFormulario()">Cancelar</button>
      </div>
    </form>
    
    <button *ngIf="!mostrarForm" (click)="mostrarFormulario()">Añadir nueva lista</button>
  </div>
</main>
