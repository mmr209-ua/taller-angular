<main class="main">
  <div class="container">
    <h1><strong>{{ title }}</strong></h1>
    <ngb-alert type="success" *ngIf="msg!=''" 
      (close)="msg=''">
      {{msg}}
    </ngb-alert>
    <div *ngFor="let lista of listas" class="cards">
      <div class="card" [ngStyle] = "{'background-color': lista.color}">
        <div class="card-header">
          <h5 class="card-title">{{lista.nombre}}</h5>
        </div>
        <div class="card-body">
          <app-lista
            *ngIf="lista.visible"
            [lista]="lista"
            (cerrarDetalle)="ocultarDetalle(lista)">
          </app-lista>
          <button *ngIf="!lista.visible" class="button btn btn-sm btn-primary" (click)="mostrarDetalle(lista)">
            Ver detalle
          </button>
          <button class="button btn btn-sm btn-secondary">Modificar</button>
          <button
            class="button btn btn-sm btn-danger"
            (click)="abrirModalEliminar(confirmarEliminacionModal, lista)">
            Eliminar
          </button>
        </div>  
      </div>
    </div>

    <ng-template #confirmarEliminacionModal let-modal>
      <div class="modal-header">
        <h5 class="modal-title">Confirmar eliminación</h5>
      </div>
      <div class="modal-body">
        <p>¿Quieres eliminar la lista <strong>{{ listaSeleccionada?.nombre }}</strong>?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancelar</button>
        <button type="button" class="btn btn-danger" (click)="confirmarEliminacion(modal)">Eliminar</button>
      </div>
    </ng-template>



    <form *ngIf="mostrarForm">
      <p>Nombre: </p>
      <input type="text" id="nombre" name="nombre" required
        [(ngModel)]="nueva.nombre" name="nombre">
      <p>Descripción: </p>
      <input type="text" id="descripcion" name="descripcion" required
        [(ngModel)]="nueva.descripcion" name="descripcion">
      <p>Color: </p>
      <input type="color" id="color" name="color" required
        [(ngModel)]="nueva.color" name="color">
      <div>
        <button (click)="crearLista()">Crear lista</button>
        <button (click)="ocultarFormulario()">Cancelar</button>
      </div>
    </form>
    
    <button *ngIf="!mostrarForm" (click)="mostrarFormulario()">Añadir nueva lista</button>
  </div>
</main>
